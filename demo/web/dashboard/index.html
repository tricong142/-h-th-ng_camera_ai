    // ─────────────────────────────────────────────────────────────────────────
    // TEST TRAIN TAB — state & logic
    // ─────────────────────────────────────────────────────────────────────────
    const ttState = {
      loading: false,
      result: null,      // last API response
      previewUrl: null,  // object URL for the selected local file
      model: localStorage.getItem("tt_model") === "ensemble" ? "train" : (localStorage.getItem("tt_model") || "train"),
      history: (() => {
        try {
          return JSON.parse(localStorage.getItem("tt_history")) || [];
        } catch (_) {
          return [];
        }
      })(),
      initialized: false
    };

    function renderTestTrain() {
      const el = $("viewTestTrain");
      if (!el || el.classList.contains("hidden")) return;

      const r = ttState.result;
      const conf = r?.ocr?.confidence ?? null;
      const confPct = conf !== null ? Math.round(conf * 100) : 0;
      const plateText = r?.ocr?.plate || r?.plate || "";
      const isValid = r?.ocr?.valid;
      const detCount = r?.detection?.count ?? 0;
      const cropUrl = r?.detection?.crop_url ? fileUrl(r.detection.crop_url) : null;
      const imageUrl = r?.image_url ? fileUrl(r.image_url) : null;

      // Build character chips from plate string
      function charsHtml(plate) {
        if (!plate) return `<span style="color:var(--faint);font-size:12px;">Chưa nhận diện được</span>`;
        return [...plate].map(c => {
          if (c === '-') return `<div class="tt-char sep">-</div>`;
          const cls = confPct >= 80 ? 'hi' : confPct >= 50 ? '' : 'lo';
          return `<div class="tt-char ${cls}">${esc(c)}</div>`;
        }).join('');
      }

      // History rows
      function historyHtml() {
        if (!ttState.history.length) return `<div style="padding:24px;text-align:center;color:var(--faint);font-size:13px;"><i class="ti ti-history" style="font-size:24px;display:block;margin-bottom:8px;"></i>Chưa có lịch sử test</div>`;
        return ttState.history.slice(0, 20).map((h, i) => {
          const c = h.ocr?.confidence ?? 0;
          const cp = Math.round(c * 100);
          const thumb = h.image_url ? fileUrl(h.image_url) : null;
          return `<div class="tt-history-item" data-tt-hist="${i}">
            ${thumb ? `<img class="tt-history-thumb" src="${esc(thumb)}" alt="">` : `<div class="tt-history-thumb-empty"><i class="ti ti-photo"></i></div>`}
            <div style="flex:1;min-width:0;">
              <div class="tt-history-plate">${esc(h.ocr?.plate || h.plate || '--')}</div>
              <div class="tt-history-meta">${esc(h.filename || '?')} · ${h.detection?.count ?? 0} biển</div>
            </div>
            <div class="tt-history-conf ${cp >= 70 ? 'good' : 'bad'}">${cp}%</div>
          </div>`;
        }).join('');
      }

      el.innerHTML = `
        <div class="tt-header">
          <div class="tt-header-title">
            <i class="ti ti-flask"></i>
            Test Train — Kiểm thử Nhận diện Biển số
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <label style="font-size:11px;font-weight:600;color:var(--muted);">Chọn model:</label>
            <select id="ttModelSelect" style="height:28px;font-size:11px;padding:0 8px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);color:var(--text);cursor:pointer;outline:none;">
              <option value="train" ${ttState.model === 'train' ? 'selected' : ''}>Train (Mặc định)</option>
              <option value="train_cai_tien_1" ${ttState.model === 'train_cai_tien_1' ? 'selected' : ''}>Cải tiến 1</option>
              <option value="train_cai_tien_2" ${ttState.model === 'train_cai_tien_2' ? 'selected' : ''}>Cải tiến 2</option>
            </select>
            <span class="badge info" style="font-size:11px;"><i class="ti ti-brain"></i> ${ttState.model === 'train' ? 'Train' : ttState.model === 'train_cai_tien_1' ? 'Cải tiến 1' : 'Cải tiến 2'}</span>
            ${ttState.history.length ? `<span class="badge" style="font-size:11px;">${ttState.history.length} lần test</span>` : ''}
          </div>
        </div>

        <div class="tt-body">
          <!-- Left: upload + preview -->
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div class="tt-upload-zone" id="ttDropZone">
              <input type="file" id="ttFileInput" accept="image/*" multiple>
              <i class="ti ti-photo-up"></i>
              <strong>Kéo thả hoặc click để chọn ảnh</strong>
              <span>JPG, PNG, WEBP — hỗ trợ nhiều ảnh cùng lúc</span>
            </div>

            <div class="tt-preview-wrap" id="ttPreviewWrap">
              ${ttState.loading
                ? `<div class="tt-loading"><i class="ti ti-loader-2"></i><span>Đang xử lý...</span></div>`
                : ttState.previewUrl
                  ? `<img src="${esc(ttState.previewUrl)}" id="ttPreviewImg" alt="preview">
                     ${detCount > 0 ? `<div class="tt-det-badge"><i class="ti ti-viewfinder"></i> ${detCount} biển phát hiện</div>` : ''}`
                  : `<div class="tt-preview-empty"><i class="ti ti-photo"></i><span>Chưa có ảnh</span></div>`
              }
            </div>

            ${r?.error ? `<div class="tt-error"><i class="ti ti-alert-triangle"></i><div><b>Lỗi pipeline:</b><br>${esc(r.error)}</div></div>` : ''}
          </div>

          <!-- Right: result panel -->
          <div class="tt-result-panel">
            <!-- Plate display -->
            <div class="tt-plate-display">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;">Kết quả nhận diện</div>
              <div class="tt-plate-num ${plateText ? (isValid ? 'valid' : 'invalid') : 'empty'}">
                ${plateText ? esc(plateText) : (ttState.loading ? '...' : 'Tải ảnh lên')}
              </div>
              ${plateText ? `
                <div style="display:flex;justify-content:center;gap:6px;margin-top:6px;">
                  <span class="badge ${isValid ? 'good' : 'warn'}">${isValid ? '✓ Hợp lệ' : '⚠ Nghi ngờ'}</span>
                  ${r?.ocr?.raw && r.ocr.raw !== plateText ? `<span class="badge" style="font-size:10px;">RAW: ${esc(r.ocr.raw)}</span>` : ''}
                </div>` : ''}
              ${conf !== null ? `
                <div class="tt-conf-bar-wrap">
                  <div class="tt-conf-bar-track"><div class="tt-conf-bar-fill" style="width:${confPct}%"></div></div>
                  <div class="tt-conf-labels"><span>Độ tin cậy OCR</span><b style="color:${confPct>=80?'var(--green)':confPct>=50?'var(--amber)':'var(--red)'};">${confPct}%</b></div>
                </div>
                <div class="tt-chars">${charsHtml(plateText)}</div>` : ''}
            </div>

            <!-- Detection details -->
            ${r ? `<div class="tt-detail-row">
              <div class="tt-kv"><span><i class="ti ti-viewfinder"></i> Biển phát hiện (YOLO)</span><b>${detCount} biển · conf ${r.detection?.best_conf ?? '--'}</b></div>
              <div class="tt-kv"><span><i class="ti ti-text-recognition"></i> OCR source</span><b>${esc(r.ocr?.source || '--')}</b></div>
              <div class="tt-kv"><span><i class="ti ti-file-description"></i> File</span><b style="font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.filename || '--')}</b></div>
              ${cropUrl ? `<div class="tt-kv"><span><i class="ti ti-crop"></i> Crop biển số</span><img class="tt-crop-img" src="${esc(cropUrl)}" alt="crop"></div>` : ''}
              ${imageUrl ? `<div class="tt-kv"><span><i class="ti ti-external-link"></i> Ảnh gốc</span><a class="btn" href="${esc(imageUrl)}" target="_blank" style="height:26px;font-size:11px;">Mở</a></div>` : ''}
            </div>` : `<div style="padding:24px;text-align:center;color:var(--faint);font-size:13px;"><i class="ti ti-flask" style="font-size:36px;display:block;margin-bottom:10px;"></i>Chọn ảnh để bắt đầu test<br>Pipeline: YOLO detect → Crop → OCR Train</div>`}
          </div>
        </div>

        <!-- History -->
        <div class="tt-history">
          <div class="tt-history-head">
            <div style="display:flex;align-items:center;gap:8px;"><i class="ti ti-history"></i>Lịch sử test</div>
            ${ttState.history.length ? `<button class="btn" id="ttClearBtn" style="height:26px;font-size:11px;"><i class="ti ti-trash"></i> Xóa</button>` : ''}
          </div>
          <div class="tt-history-list" id="ttHistoryList">${historyHtml()}</div>
        </div>`;

      // Wire up events
      const dropZone = $("ttDropZone");
      const fileInput = $("ttFileInput");
      const modelSelect = $("ttModelSelect");

      dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
      dropZone.addEventListener("drop", e => {
        e.preventDefault(); dropZone.classList.remove("drag-over");
        const files = [...e.dataTransfer.files].filter(f => f.type.startsWith("image/"));
        if (files.length) ttRunBatch(files);
      });
      fileInput.addEventListener("change", () => {
        const files = [...fileInput.files];
        if (files.length) ttRunBatch(files);
      });

      if (modelSelect) {
        modelSelect.addEventListener("change", () => {
          ttState.model = modelSelect.value;
          localStorage.setItem("tt_model", ttState.model);
          renderTestTrain();
        });
      }

      $("ttClearBtn")?.addEventListener("click", () => {
        ttState.history = []; ttState.result = null; ttState.previewUrl = null;
        localStorage.removeItem("tt_history");
        renderTestTrain();
      });

      // Click history item to restore
      document.querySelectorAll("[data-tt-hist]").forEach(item => {
        item.addEventListener("click", () => {
          const idx = Number(item.dataset.ttHist);
          ttState.result = ttState.history[idx];
          ttState.previewUrl = fileUrl(ttState.history[idx].image_url);
          renderTestTrain();
        });
      });
    }

    async function ttRunBatch(files) {
      for (const file of files) {
        ttState.loading = true;
        ttState.previewUrl = URL.createObjectURL(file);
        ttState.result = null;
        renderTestTrain();
        try {
          const form = new FormData();
          form.append("image", file);
          form.append("model", ttState.model);
          const data = await api("/api/ocr/test", { method: "POST", body: form });
          ttState.result = data;
          ttState.history.unshift(data);
          if (ttState.history.length > 50) ttState.history.pop();
          localStorage.setItem("tt_history", JSON.stringify(ttState.history));
        } catch (err) {
          ttState.result = { error: err.message, filename: file.name, ocr: null, detection: null, plate: "" };
        } finally {
          ttState.loading = false;
          renderTestTrain();
        }
      }
    }
    // ─────────────────────────────────────────────────────────────────────────

    function renderParking() {
      const sim = state.sim;
      const apiActive = state.parking.active || [];
      const apiDone   = state.parking.completed || [];
      const feePerHour = state.parking.fee_per_hour || 10000;
      const totalInside   = apiActive.length;
      const totalRevenue  = [...sim.exitLog, ...apiDone].reduce((s, x) => s + Number(x.fee || 0), 0);

      function entryLogHtml() {
        if (!sim.entryLog.length) return `<div class="sim-empty"><i class="ti ti-door-enter"></i><span>Chờ xe vào...</span></div>`;
        return sim.entryLog.slice(0, 12).map(e => `
          <div class="sim-entry-card${e.isNew ? ' sim-card-new' : ''}">
            <div class="sim-card-img-wrap" ${e.imageUrl ? `data-preview-url="${esc(e.imageUrl)}" data-preview-caption="${esc(e.plate)}" style="cursor: pointer;"` : ''}>
              ${e.imageUrl ? `<img class="sim-card-img" src="${esc(e.imageUrl)}" alt=""><div class="sim-card-img-hover"><i class="ti ti-zoom-in"></i></div>` : `<div class="sim-card-no-img"><i class="ti ti-car"></i></div>`}
            </div>
            <div class="sim-card-content">
              <div class="sim-card-header">
                <div class="sim-card-plate">${esc(e.plate)}</div>
                <span class="badge good" style="font-size:10px; padding: 2px 6px;">Vào bãi</span>
              </div>
              <div class="sim-card-meta">
                <span><i class="ti ti-clock"></i> ${esc(e.time)}</span>
                <span class="badge info" style="font-size:10px; padding: 2px 6px;">OCR ${e.conf}%</span>
              </div>
            </div>
          </div>`).join('');
      }
      function insideHtml() {
        if (!apiActive.length) return `<div class="sim-empty"><i class="ti ti-parking"></i><span>Bãi xe trống</span></div>`;
        return apiActive.map(v => {
          const plate = v.plate;
          const entAt = v.entry_at || '--';
          const entryTime = entAt.includes('T') ? new Date(entAt).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : entAt;
          const imgUrl = fileUrl(v.entry_image);
          return `<div class="sim-inside-row">
            ${imgUrl ? `<img class="sim-inside-img-thumb" src="${esc(imgUrl)}" alt="" style="width:48px;height:34px;object-fit:cover;border-radius:4px;flex-shrink:0;border:1px solid var(--line);cursor:pointer;" data-preview-url="${esc(imgUrl)}" data-preview-caption="${esc(plate)}">` : ''}
            <div style="flex:1;min-width:0;">
              <div class="sim-inside-plate">${esc(plate)}</div>
              <div class="sim-inside-info">
                <span><i class="ti ti-login"></i> ${esc(entryTime)}</span>
                <span style="color:var(--amber);"><i class="ti ti-timer"></i> ${elapsed(v.entry_at)}</span>
              </div>
            </div>
            <button class="btn danger" style="height:28px;padding:0 10px;font-size:11px;flex-shrink:0;" data-manual-exit="${esc(plate)}">
              <i class="ti ti-logout"></i> Ra
            </button>
          </div>`;
        }).join('');
      }
      function exitLogHtml() {
        const all = [...sim.exitLog, ...apiDone];
        if (!all.length) return `<div class="sim-empty"><i class="ti ti-door-exit"></i><span>Chờ xe ra...</span></div>`;
        return all.slice(0, 12).map(e => {
          const imgUrl = e.imageUrl || fileUrl(e.entry_image);
          return `
          <div class="sim-exit-card${e.isNew ? ' sim-card-new' : ''}">
            <div class="sim-card-img-wrap" ${imgUrl ? `data-preview-url="${esc(imgUrl)}" data-preview-caption="${esc(e.plate)}" style="cursor: pointer;"` : ''}>
              ${imgUrl ? `<img class="sim-card-img" src="${esc(imgUrl)}" alt=""><div class="sim-card-img-hover"><i class="ti ti-zoom-in"></i></div>` : `<div class="sim-card-no-img"><i class="ti ti-car"></i></div>`}
            </div>
            <div class="sim-card-content">
              <div class="sim-card-header">
                <div class="sim-card-plate">${esc(e.plate)}</div>
                <span class="badge good" style="font-size:10px; padding: 2px 6px;">Đã TT</span>
              </div>
              <div class="sim-card-meta">
                <span><i class="ti ti-login"></i> ${esc(e.enteredAt || e.entry_at || '--')}</span>
                <span><i class="ti ti-logout"></i> ${esc(e.exitedAt || e.exit_at || '--')}</span>
              </div>
              <div class="sim-card-meta">
                <span style="color:var(--amber);"><i class="ti ti-timer"></i> ${esc(e.duration || (e.duration_minutes ? e.duration_minutes + ' phút' : '--'))}</span>
                <span style="color:var(--green);font-weight:700;"><i class="ti ti-coin"></i> ${money(e.fee || 0)}</span>
              </div>

      $("viewParking").innerHTML = `

          <div class="sim-stats">

            <div class="sim-stat"><span>Lượt vào</span><b>${sim.entryLog.length}</b></div>
            <div class="sim-stat"><span>Lượt ra</span><b>${sim.exitLog.length + apiDone.length}</b></div>
            <div class="sim-stat revenue"><span>Doanh thu</span><b>${money(totalRevenue)}</b></div>

          <div class="sim-controls">
            ${!sim.running
              ? `<button id="simStartBtn" class="btn primary" style="background:var(--green);color:#fff;border-color:transparent;"><i class="ti ti-player-play"></i> Chạy Giả Lập</button>`
              : `<button id="simStopBtn" class="btn danger"><i class="ti ti-player-stop"></i> Dừng</button>`
            }
            <button id="simResetBtn" class="btn"><i class="ti ti-trash"></i> Reset</button>
            <div class="sim-field"><label>Giây/xe:</label><input id="simIntervalInput" type="number" min="2" max="60" value="${sim.intervalSec}"></div>
            <div class="sim-field"><label>Ra sau (s):</label><input id="simExitInput" type="number" min="5" max="300" value="${sim.exitDelaySec}"></div>

              <button id="manualEntryBtn" class="btn primary" style="height:34px;"><i class="ti ti-login"></i> Ghi vào</button>
            </div>
          </div>
          <div class="sim-manual-section">
            <span class="label"><i class="ti ti-logout"></i> Ghi xe ra thủ công</span>

              <input id="manualExitPlate" class="control" placeholder="Biển số cần ra" style="height:34px;width:150px;">

      if (!sim.running) {

        $("simStopBtn").onclick  = () => stopSimulation();

      $("simResetBtn").onclick = () => resetSimulation();
      $("simIntervalInput").onchange = e => { state.sim.intervalSec  = Math.max(2, Number(e.target.value) || 5); };
      $("simExitInput").onchange     = e => { state.sim.exitDelaySec = Math.max(5, Number(e.target.value) || 20); };

      $("viewParking").querySelectorAll("[data-preview-url]").forEach(el => {
        el.onclick = (e) => {
          e.stopPropagation();
          showImageModal(el.dataset.previewUrl, el.dataset.previewCaption);
        };
      });
    }

    // ── Simulation engine ─────────────────────────────────────────────
    function simNow() {
      return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    async function simStep() {
      if (!state.sim.running) return;
      try {
        const imgName = state.sim.images[Math.floor(Math.random() * state.sim.images.length)];
        const imgUrl = `/data_images/${imgName}`;
        
        const resp = await fetch(imgUrl);
        const blob = await resp.blob();
        const file = new File([blob], imgName, { type: "image/jpeg" });
        
        const form = new FormData();
        form.append("image", file);
        form.append("plate", "");
        
        const data = await api("/api/parking/entry", { method: "POST", body: form });
        state.parking = data.parking;
        
        const session = data.session;
        if (session && session.plate) {
          const entry = {
            plate: session.plate,
            imageUrl: fileUrl(session.entry_image),
            conf: session.entry_ocr?.confidence ? Math.round(session.entry_ocr.confidence * 100) : 95,
            time: simNow(),
            enteredAt: simNow(),
            isNew: true
          };
          state.sim.entryLog.unshift(entry);
          if (state.sim.entryLog.length > 30) state.sim.entryLog.pop();
          
          const delay = (state.sim.exitDelaySec || 20) * 1000;
          state.sim._exitTimers[session.plate + '_' + Date.now()] = setTimeout(() => {
            simTriggerExit(session.plate);
          }, delay);
          
          setTimeout(() => { entry.isNew = false; }, 900);
        }
        render();
      } catch (err) {
        console.error("Simulation step error:", err);
      }
    }
    async function simTriggerExit(plate) {
      try {
        const form = new FormData();
        form.append("plate", plate);
        const data = await api("/api/parking/exit", { method: "POST", body: form });
        state.parking = data.parking;
        
        const session = data.session;
        if (session) {
          const rec = {
            plate: session.plate,
            enteredAt: new Date(session.entry_at).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
            exitedAt: new Date(session.exit_at).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
            duration: `${session.duration_minutes || 1} phút`,
            fee: session.fee || 0,
            imageUrl: fileUrl(session.entry_image),
            isNew: true
          };
          state.sim.exitLog.unshift(rec);
          if (state.sim.exitLog.length > 30) state.sim.exitLog.pop();
          setTimeout(() => { rec.isNew = false; }, 900);
        }
        render();
      } catch (err) {
        console.error("Simulation exit error:", err);
      }
    }
    function startSimulation() {
      if (state.sim.running) return;
      state.sim.running = true;
      simStep();
      state.sim._timer = setInterval(() => {
        simStep();
      }, (state.sim.intervalSec || 5) * 1000);
      renderParking();
    }
    function stopSimulation() {
      state.sim.running = false;
      if (state.sim._timer) { clearInterval(state.sim._timer); state.sim._timer = null; }
      renderParking();
    }
    function resetSimulation() {
      stopSimulation();
      Object.values(state.sim._exitTimers).forEach(t => clearTimeout(t));
      state.sim._exitTimers = {};
      state.sim.entryLog = [];
      state.sim.exitLog  = [];
      renderParking();
    }

    function parkingTable(rows, done) {
      return `<table><thead><tr><th>Biển</th><th>Vào</th><th>${done ? "Ra" : "Thời gian"}</th><th>Phí</th><th>Vé</th></tr></thead><tbody>${rows.map(s => `<tr><td><span class="plate">${esc(s.plate)}</span></td><td>${esc(s.entry_at || "--")}</td><td>${esc(done ? s.exit_at : elapsed(s.entry_at))}</td><td>${done ? money(s.fee) : "--"}</td><td>${s.ticket_url ? `<a class="btn" href="${esc(fileUrl(s.ticket_url))}" target="_blank"><i class="ti ti-printer"></i>In vé</a>` : `<button class="btn" data-exit="${esc(s.plate)}">Xe ra</button>`}</td></tr>`).join("") || emptyRow(done ? "Chưa có vé đã xuất." : "Chưa có xe trong bãi.", 5)}</tbody></table>`;
    }
    function elapsed(iso) { if (!iso) return "--"; const m = Math.max(1, Math.floor((Date.now() - new Date(iso).getTime()) / 60000)); return `${m} phút`; }
    async function parkingAction(type, plate, image) {
      const form = new FormData();
      form.append("plate", plate || "");
      if (image) form.append("image", image);
      try {
        const data = await api(`/api/parking/${type}`, { method: "POST", body: form });
        state.parking = data.parking;
        if (data.session?.ticket_url) window.open(fileUrl(data.session.ticket_url), "_blank");
        render();
      } catch (err) { alert(err.message); }
    }
    async function saveFee() {
      const form = new FormData(); form.append("fee_per_hour", $("feeInput").value || "10000");
      state.parking = await api("/api/parking/config", { method: "POST", body: form });
      render();
    }

    function empty(title, sub) { return `<div class="empty"><div><i class="ti ti-database-off"></i><b>${esc(title)}</b><div class="muted">${esc(sub)}</div></div></div>`; }
    function syncButtons() { document.querySelectorAll("[data-view-btn]").forEach(b => b.classList.toggle("active", b.dataset.viewBtn === state.view)); }
    document.querySelectorAll("[data-view-btn]").forEach(b => b.onclick = () => { state.view = b.dataset.viewBtn; render(); });
    document.querySelectorAll("[data-stage-mode]").forEach(b => b.onclick = () => { state.stageMode = b.dataset.stageMode; document.querySelectorAll("[data-stage-mode]").forEach(x => x.classList.toggle("active", x === b)); renderStage(); });
    $("videoFile").onchange = () => $("fileName").textContent = $("videoFile").files[0]?.name || "Chọn video";

    
    // Topbar Video Logic
    $("topbarVideoFile").onchange = () => $("topbarFileName").textContent = $("topbarVideoFile").files[0]?.name || "Tải video lên";
    $("topbarForm").onsubmit = async (e) => {
      e.preventDefault();
      const file = $("topbarVideoFile").files[0];
      if (!file) { $("topbarFileName").textContent = "Vui lòng chọn video!"; $("topbarFileName").style.color = "var(--red)"; return; }
      $("topbarFileName").style.color = "var(--text)";
      
      const runMode = state.view === "violations" ? "traffic" : "plate";
      const qs = new URLSearchParams({ 
        mode: runMode, 
        save_video: "false", 
        max_frames: "0",
        roi: $("advRoi")?.value || "",
        plate_conf: $("advConf")?.value || "0.25",
        min_plate_score: $("advScore")?.value || "0.5",
        plate_interval: $("advInterval")?.value || "2"
      });
      const form = new FormData(); form.append("file", file);
      $("topbarRunBtn").disabled = true; 
      $("topbarRunBtn").innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;"></i> Đang nạp...';
      try { 
        const j = await api(`/api/jobs?${qs}`, { method: "POST", body: form }); 
        state.activeJobId = jobId(j); 
        await refresh(); 
      }
      catch (err) { alert(err.message); }
      finally { 
        $("topbarRunBtn").disabled = false; 
        updateRunBtnState();
      }
    };

    $("topbarStopBtn").onclick = async () => {
      if (!state.activeJobId) return;
      if (!confirm("Bạn có chắc chắn muốn dừng quá trình phân tích?")) return;
      $("topbarStopBtn").disabled = true;
      $("topbarStopBtn").innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;"></i> Đang dừng...';
      try {
        await api(`/api/jobs/${state.activeJobId}/cancel`, { method: "POST" });
        await refresh();
      } catch (err) { alert(err.message); }
      finally {
        $("topbarStopBtn").disabled = false;
        $("topbarStopBtn").innerHTML = '<i class="ti ti-player-stop-filled"></i> Dừng ngay';
      }
    };

    $("jobForm").onsubmit = async (e) => {
      e.preventDefault();
      const file = $("videoFile").files[0];
      if (!file) { $("fileName").textContent = "Cần chọn video"; return; }
      const qs = new URLSearchParams({ 
        mode: $("mode").value, 
        save_video: $("saveVideo").checked ? "true" : "false", 
        max_frames: $("maxFrames").value || "0",
        roi: $("advRoi")?.value || "",
        plate_conf: $("advConf")?.value || "0.25",
        min_plate_score: $("advScore")?.value || "0.5",
        plate_interval: $("advInterval")?.value || "2"
      });
      const form = new FormData(); form.append("file", file);
      $("runBtn").disabled = true; $("runBtn").innerHTML = '<i class="ti ti-loader-2"></i>Đang nạp';
      try { 
        const j = await api(`/api/jobs?${qs}`, { method: "POST", body: form }); 
        state.activeJobId = jobId(j); 
        state.view = $("mode").value === "plate" ? "find-plate" : $("mode").value === "wrong_lane" ? "violations" : "operations"; 
        await refresh(); 
      }
      catch (err) { alert(err.message); }
      finally { $("runBtn").disabled = false; $("runBtn").innerHTML = '<i class="ti ti-player-play"></i>Chạy Pipeline'; }
    };
    
    function animateProgress() {
      const j = activeJob();
      if (!j) {
        requestAnimationFrame(animateProgress);
        return;
      }

      let target = 0;
      if (j.status === "completed" || j.status === "failed") {
        target = 100;
      } else if (j.status === "queued") {
        target = 5;
      } else if (j.status === "running") {
        const plan = runtimePlan(j) || [];
        const stage = plan.find(s => s.id === j.stage);
        if (stage) {
          const elapsedMs = (Number(j.stage_elapsed_seconds || 0) * 1000) + (Date.now() - lastResponseTime);
          const estimateMs = (Number(j.stage_estimated_seconds || stage.estimated_seconds || 1)) * 1000;
          const ratio = Math.min(0.98, elapsedMs / Math.max(1, estimateMs));
          const start = Number(stage.progress_from || 0);
          const end = Number(stage.progress_to || start);
          target = start + (end - start) * ratio;
        } else {
          target = Number(j.progress || 0);
        }
      }

      const speed = (j.status === "completed" || j.status === "failed") ? 0.08 : 0.015;
      currentProgress += (target - currentProgress) * speed;
      if (Math.abs(currentProgress - target) < 0.05) {
        currentProgress = target;
      }

      const activeBars = document.querySelectorAll(".running .bar, #viewOperations .bar, .card.active .bar");
      activeBars.forEach(bar => {
        bar.style.width = `${currentProgress}%`;
      });

      const percentBadge = document.querySelector(".running .badge");
      if (percentBadge) {
        percentBadge.textContent = `${Math.round(currentProgress)}%`;
      }
      
      const summaryJob = state.jobs.find(x => jobId(x) === state.activeJobId);
      if (summaryJob && summaryJob.status === "running") {
        const summaryText = document.querySelector("#summary");
        if (summaryText) {
          summaryText.textContent = `Job ${jobId(summaryJob)} | ${summaryJob.status} | ${summaryJob.stage} | Progress: ${Math.round(currentProgress)}% | ${summaryJob.runtime_message || summaryJob.message || ""}`;
        }
      }

      requestAnimationFrame(animateProgress);
    }

    $("refreshBtn").onclick = refresh;
    refresh();
    setInterval(refresh, 2500);
    requestAnimationFrame(animateProgress);
  </script>
</body>
</html>
